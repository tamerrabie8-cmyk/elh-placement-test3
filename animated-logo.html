<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELH - English Learning Hub Animated Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
        }

        /* Outer Circle Animation */
        .outer-circle {
            animation: rotateCircle 20s linear infinite;
            transform-origin: 150px 150px;
        }

        @keyframes rotateCircle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Speech Bubbles Animation */
        .bubble-group {
            animation: floatBubbles 3s ease-in-out infinite;
        }

        @keyframes floatBubbles {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* World Map Animation */
        .world-map {
            animation: pulseWorld 2s ease-in-out infinite;
            transform-origin: 110px 110px;
        }

        @keyframes pulseWorld {
            0%, 100% { 
                transform: scale(1);
                opacity: 1;
            }
            50% { 
                transform: scale(1.05);
                opacity: 0.9;
            }
        }

        /* ELH Text Animation */
        .elh-text {
            animation: shineText 3s ease-in-out infinite;
            transform-origin: 190px 110px;
        }

        @keyframes shineText {
            0%, 100% { 
                filter: brightness(1);
            }
            50% { 
                filter: brightness(1.2);
            }
        }

        /* English Text Animation */
        .english-text {
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Learning Hub Text Animation */
        .hub-text {
            animation: slideIn 1s ease-out 0.2s backwards;
        }

        /* Info Section */
        .info {
            text-align: center;
            color: #fff;
        }

        .info h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #ffc107;
        }

        .info p {
            font-size: 14px;
            color: #aaa;
            max-width: 300px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-wrapper {
                width: 250px;
                height: 250px;
            }

            .info h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <!-- Outer Circle -->
                <circle class="outer-circle" cx="150" cy="150" r="145" fill="none" stroke="#ffffff" stroke-width="2"/>

                <!-- Background -->
                <circle cx="150" cy="150" r="140" fill="#000000"/>

                <!-- Bubble Group -->
                <g class="bubble-group">
                    <!-- Left Bubble (World) -->
                    <circle cx="110" cy="115" r="55" fill="#003d99" stroke="#1a5bbf" stroke-width="2"/>
                    
                    <!-- World Map in left bubble -->
                    <g class="world-map">
                        <!-- North America -->
                        <path d="M 85 95 Q 90 90 95 95 Q 92 105 87 105 Z" fill="#ffc107" opacity="0.9"/>
                        <!-- South America -->
                        <path d="M 100 105 Q 105 110 102 120 Q 97 115 98 105 Z" fill="#ffc107" opacity="0.9"/>
                        <!-- Europe/Africa -->
                        <path d="M 115 90 Q 125 85 130 95 Q 125 110 115 105 Z" fill="#ffc107" opacity="0.9"/>
                    </g>

                    <!-- Right Bubble (Book) -->
                    <circle cx="190" cy="115" r="55" fill="#003d99" stroke="#1a5bbf" stroke-width="2"/>
                    
                    <!-- Book Design in right bubble -->
                    <g class="elh-text">
                        <!-- Book shape -->
                        <path d="M 165 90 L 185 85 L 215 85 L 195 90 Z" fill="none" stroke="#ffc107" stroke-width="2" stroke-linecap="round"/>
                        <rect x="165" y="90" width="50" height="50" fill="none" stroke="#ffc107" stroke-width="2.5" rx="3"/>
                        
                        <!-- ELH Text on book -->
                        <text x="190" y="125" font-size="28" font-weight="bold" fill="#ffc107" text-anchor="middle" font-family="Arial, sans-serif">ELH</text>
                    </g>
                </g>

                <!-- English Text -->
                <text class="english-text" x="150" y="190" font-size="26" font-weight="bold" fill="#003d99" text-anchor="middle" font-family="Arial, sans-serif">English</text>

                <!-- Learning Hub Text -->
                <text class="hub-text" x="150" y="225" font-size="24" font-weight="bold" fill="#ffc107" text-anchor="middle" font-family="Arial, sans-serif">Learning Hub</text>
            </svg>
        </div>

        <div class="info">
            <h1>English Learning Hub</h1>
            <p>Professional Animated Logo - Perfect for your platform</p>
        </div>
    </div>
</body>
</html>
